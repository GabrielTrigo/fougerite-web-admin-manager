services:
  redis:
    image: redis:7-alpine
    container_name: fwam-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  fwam-backend:
    build:
      context: ../fwam/fwam-backend
      dockerfile: Dockerfile
    container_name: fwam-backend
    ports:
      - "5259:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/fwam.db
      - Redis__Host=redis
      - Redis__Port=6379
      - AllowedHosts=*
    volumes:
      - fwam_db_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
    name: fwam_redis_data
  fwam_db_data:
    name: fwam_db_data
